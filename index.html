<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>輪休填報系統</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif; background: #f0f4f8; min-height: 100vh; }

.entry-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: linear-gradient(160deg, #1a2744 0%, #2e4a82 100%); }
.entry-box { background: white; border-radius: 16px; padding: 40px 36px; width: 340px;
  box-shadow: 0 16px 48px rgba(0,0,0,.28); }
.entry-title { font-size: 20px; font-weight: 800; color: #1a2744; text-align: center; margin-bottom: 6px; }
.entry-sub   { font-size: 12px; color: #94a3b8; text-align: center; margin-bottom: 24px; }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 12px; font-weight: 700; color: #475569; margin-bottom: 6px; }
.field input { width: 100%; padding: 10px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px;
  font-size: 15px; font-family: inherit; outline: none; }
.field input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px #dbeafe; }
.btn-go { width: 100%; padding: 12px; background: #1a2744; color: white; border: none;
  border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; }
.btn-go:hover { background: #243966; }
.admin-link { margin-top: 14px; text-align: center; font-size: 12px; color: #94a3b8; }
.admin-link a { color: #2563eb; cursor: pointer; }
.admin-link a:hover { text-decoration: underline; }

.app { display: none; min-height: 100vh; background: #f0f4f8; }
.topbar { background: #1a2744; padding: 13px 20px; display: flex; align-items: center;
  justify-content: space-between; flex-wrap: wrap; gap: 8px; }
.topbar-title { font-size: 15px; font-weight: 800; color: white; }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.topbar-name  { font-size: 13px; color: rgba(255,255,255,.75); }
.topbar-btn   { background: none; border: 1px solid rgba(255,255,255,.25); color: rgba(255,255,255,.7);
  border-radius: 6px; padding: 5px 12px; font-size: 12px; cursor: pointer; font-family: inherit; }
.topbar-btn:hover { background: rgba(255,255,255,.1); color: white; }

.main { max-width: 860px; margin: 0 auto; padding: 22px 14px; }

/* admin card */
.admin-card { background: white; border-radius: 12px; border: 1px solid #e2e8f0;
  padding: 16px 20px; margin-bottom: 18px; }
.admin-card-title { font-size: 12px; font-weight: 700; color: #94a3b8; letter-spacing:.05em; margin-bottom: 12px; }
.blocked-editor-title { font-size: 13px; font-weight: 700; color: #1a2744; margin-bottom: 10px; }
.blocked-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
.blocked-item { display: flex; align-items: center; gap: 8px; background: #fff7ed;
  border: 1px solid #fed7aa; border-radius: 8px; padding: 8px 12px; }
.blocked-item-dates { font-size: 12px; font-weight: 700; color: #c2410c; flex: 1; }
.blocked-item-label { font-size: 11px; color: #9a3412; margin-top: 1px; }
.blocked-del { background: none; border: none; cursor: pointer; color: #fca5a5;
  font-size: 16px; line-height: 1; padding: 0 2px; flex-shrink: 0; }
.blocked-del:hover { color: #dc2626; }
.blocked-empty { font-size: 12px; color: #cbd5e1; text-align: center; padding: 8px 0; }
.add-blocked-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: flex-end; }
.date-input { padding: 7px 8px; border: 1.5px solid #e2e8f0; border-radius: 7px;
  font-size: 12px; font-family: inherit; outline: none; }
.date-input:focus { border-color: #f59e0b; }
.label-input { flex: 1; min-width: 80px; padding: 7px 8px; border: 1.5px solid #e2e8f0;
  border-radius: 7px; font-size: 12px; font-family: inherit; outline: none; }
.label-input:focus { border-color: #f59e0b; }
.add-btn { padding: 7px 14px; background: #1a2744; color: white; border: none;
  border-radius: 7px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; }
.add-btn:hover { background: #243966; }

.month-nav { display: flex; align-items: center; justify-content: center; gap: 18px; margin-bottom: 14px; }
.month-btn { background: white; border: 1.5px solid #e2e8f0; border-radius: 8px;
  width: 34px; height: 34px; font-size: 16px; cursor: pointer; color: #475569;
  display: flex; align-items: center; justify-content: center; }
.month-btn:hover { border-color: #2563eb; color: #2563eb; }
.month-label { font-size: 20px; font-weight: 800; color: #1a2744; min-width: 140px; text-align: center; }

.legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; align-items: center; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #64748b; }
.legend-dot  { width: 14px; height: 14px; border-radius: 4px; }

.cal-card { background: white; border-radius: 14px; border: 1px solid #e2e8f0; overflow: hidden; }
.cal-head { display: grid; grid-template-columns: repeat(7,1fr); background: #1a2744; }
.cal-head span { text-align: center; padding: 10px 0; font-size: 12px; font-weight: 700; color: rgba(255,255,255,.75); }
.cal-head span:first-child { color: #f87171; }
.cal-head span:last-child  { color: #93c5fd; }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); }
.cal-cell { border-right: 1px solid #f1f5f9; border-bottom: 1px solid #f1f5f9;
  min-height: 82px; padding: 5px; cursor: pointer; transition: background .1s; }
.cal-cell:hover  { background: #f8fafc; }
.cal-cell.empty  { cursor: default; background: #fafafa; }
.cal-cell.today .day-num { background: #2563eb; color: white; border-radius: 50%; }
.cal-cell.sun .day-num   { color: #ef4444; }
.cal-cell.sat .day-num   { color: #3b82f6; }
.cal-cell.day-blocked    { cursor: not-allowed; background: #fffbeb; }
.cal-cell.day-blocked:hover { background: #fef3c7; }
.block-label { font-size: 9px; color: #d97706; background: #fef3c7; border-radius: 3px;
  padding: 1px 3px; margin-top: 2px; font-weight: 700; display: block;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.day-num { font-size: 13px; font-weight: 700; color: #334155;
  width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; }
.cell-tags { margin-top: 3px; display: flex; flex-direction: column; gap: 2px; }
.cell-tag  { font-size: 10px; font-weight: 700; border-radius: 4px; padding: 1px 4px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.cell-note { font-size: 9px; color: #94a3b8; margin-top: 1px; overflow: hidden;
  text-overflow: ellipsis; white-space: nowrap; font-style: italic; }
.t-shift { background: #dbeafe; color: #1d4ed8; }
.t-off   { background: #dcfce7; color: #15803d; }
.t-event { background: #fef9c3; color: #a16207; }
.t-sick  { background: #fee2e2; color: #dc2626; }
.t-comp  { background: #f3e8ff; color: #7c3aed; }
.who-list { margin-top: 2px; display: flex; flex-direction: column; gap: 1px; }
.who-row  { font-size: 9px; color: #64748b; background: #f8fafc; border-radius: 3px;
  padding: 1px 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.summary-card { background: white; border-radius: 14px; border: 1px solid #e2e8f0;
  margin-bottom: 18px; overflow: hidden; }
.summary-head { background: #1a2744; color: white; padding: 12px 18px;
  display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
.summary-head-title { font-size: 14px; font-weight: 700; }
.export-btn { padding: 6px 14px; border: 1px solid rgba(255,255,255,.3); border-radius: 6px;
  background: transparent; color: white; font-size: 12px; cursor: pointer; font-family: inherit; }
.export-btn:hover { background: rgba(255,255,255,.1); }
.summary-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.summary-table th { background: #f8fafc; padding: 7px 8px; text-align: center;
  font-size: 10px; font-weight: 700; color: #94a3b8; border-bottom: 1px solid #f1f5f9; white-space: nowrap; }
.summary-table th.blocked-th { background: #fef3c7; color: #d97706; }
.summary-table th:first-child { text-align: left; padding-left: 14px; }
.summary-table td { padding: 6px 6px; border-bottom: 1px solid #f8fafc; text-align: center; vertical-align: middle; }
.summary-table td:first-child { font-weight: 700; text-align: left; white-space: nowrap; padding-left: 14px; }
.summary-table td.blocked-td { background: #fffbeb; }
.summary-table tr:last-child td { border-bottom: none; }
.mini-tag { display: inline-block; padding: 1px 4px; border-radius: 3px; font-size: 10px; font-weight: 800; }

.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4);
  z-index: 100; align-items: center; justify-content: center; padding: 16px; }
.overlay.show { display: flex; }
.popup { background: white; border-radius: 16px; padding: 22px 20px; width: 100%; max-width: 380px;
  box-shadow: 0 16px 48px rgba(0,0,0,.25); max-height: 92vh; overflow-y: auto; }
.popup-title { font-size: 16px; font-weight: 800; color: #1a2744; margin-bottom: 16px; }
.sec-label { font-size: 11px; font-weight: 700; color: #94a3b8; letter-spacing: .05em;
  margin-bottom: 7px; margin-top: 14px; }
.sec-label:first-of-type { margin-top: 0; }
.shift-grid { display: grid; grid-template-columns: repeat(6,1fr); gap: 5px; }
.sg-btn { height: 36px; border: 2px solid #e2e8f0; border-radius: 7px; font-size: 13px;
  font-weight: 800; cursor: pointer; font-family: inherit; background: white; color: #334155; transition: all .1s; }
.sg-btn:hover  { border-color: #93c5fd; background: #eff6ff; }
.sg-btn.active { border-color: #2563eb; background: #dbeafe; color: #1d4ed8; }
.leave-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 6px; }
.lv-btn { height: 38px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 12px;
  font-weight: 700; cursor: pointer; font-family: inherit; background: white; color: #475569; transition: all .1s; }
.lv-btn.a-off   { border-color: #16a34a; background: #dcfce7; color: #15803d; }
.lv-btn.a-event { border-color: #ca8a04; background: #fef9c3; color: #a16207; }
.lv-btn.a-sick  { border-color: #dc2626; background: #fee2e2; color: #dc2626; }
.lv-btn.a-comp  { border-color: #7c3aed; background: #f3e8ff; color: #7c3aed; }
.note-input { width: 100%; padding: 8px 10px; border: 1.5px solid #e2e8f0; border-radius: 8px;
  font-size: 13px; font-family: inherit; outline: none; resize: none; }
.note-input:focus { border-color: #2563eb; }
.popup-actions { display: flex; gap: 8px; margin-top: 16px; }
.btn-cancel { flex: 1; padding: 10px; border: 1.5px solid #e2e8f0; border-radius: 8px;
  background: white; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; color: #64748b; }
.btn-save   { flex: 2; padding: 10px; border: none; border-radius: 8px; background: #1a2744;
  color: white; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
.btn-save:disabled { background: #94a3b8; cursor: not-allowed; }
.btn-clear  { flex: 1; padding: 10px; border: 1.5px solid #fca5a5; border-radius: 8px;
  background: white; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; color: #dc2626; }
.spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.4);
  border-top-color: white; border-radius: 50%; animation: spin .7s linear infinite; vertical-align: middle; margin-right: 5px; }
@keyframes spin { to { transform: rotate(360deg); } }
.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
  background: #1a2744; color: white; padding: 10px 22px; border-radius: 99px;
  font-size: 13px; font-weight: 600; z-index: 999; opacity: 0; transition: opacity .25s;
  pointer-events: none; white-space: nowrap; }
.toast.show { opacity: 1; }
.toast.err  { background: #dc2626; }
</style>
</head>
<body>

<script>
const API_URL   = 'https://script.google.com/macros/s/AKfycbwNkWGrJ41a4880xel3aoYfu2hKkquPSk3MYpNlzu0nHjPcy_xKnCOwe9-crNvGKN--0g/exec';
const ADMIN_KEY = 'admin2025';
</script>

<!-- Entry -->
<div class="entry-wrap" id="entryWrap">
  <div class="entry-box">
    <div class="entry-title">🗓 輪休填報系統</div>
    <div class="entry-sub">輸入姓名即可開始填報</div>
    <div class="field"><label>你的姓名</label><input id="inputName" placeholder="例：王小明" maxlength="20" /></div>
    <button class="btn-go" onclick="doEnter()">進入填報</button>
    <div class="admin-link">管理員？<a onclick="openAdminLogin()">點此進入後台</a></div>
  </div>
</div>

<!-- Admin login -->
<div class="entry-wrap" id="adminLoginWrap" style="display:none">
  <div class="entry-box">
    <div class="entry-title">🗂 管理員後台</div>
    <div class="entry-sub">輸入管理員密碼</div>
    <div class="field"><label>管理員密碼</label><input id="adminPwd" type="password" placeholder="輸入密碼" /></div>
    <button class="btn-go" onclick="doAdminLogin()">登入後台</button>
    <div class="admin-link"><a onclick="backToEntry()">← 返回</a></div>
  </div>
</div>

<!-- App -->
<div class="app" id="appWrap">
  <div class="topbar">
    <div class="topbar-title">🛡 輪休填報系統</div>
    <div class="topbar-right">
      <span class="topbar-name" id="topName"></span>
      <button class="topbar-btn" id="reloadBtn" style="display:none" onclick="reloadData()">🔄 重新載入</button>
      <button class="topbar-btn" onclick="doExit()">切換身份</button>
      <button class="topbar-btn" onclick="doLogout()" style="border-color:rgba(255,100,100,.4);color:rgba(255,180,180,.8)">登出</button>
    </div>
  </div>
  <div class="main">

    <!-- admin: blocked dates only -->
    <div class="admin-card" id="adminCard" style="display:none">
      <div class="admin-card-title">管理員控制台</div>
      <div class="blocked-editor-title">🚫 封鎖日期（不可填報）</div>
      <div class="blocked-list" id="blockedList"></div>
      <div class="add-blocked-row">
        <input type="date" class="date-input" id="blockStart" title="起始日期" />
        <input type="date" class="date-input" id="blockEnd" title="迄止日期（單日可不填）" />
        <input type="text" class="label-input" id="blockLabel" placeholder="原因（選填）" maxlength="12" />
        <button class="add-btn" onclick="addBlocked()">＋ 新增</button>
      </div>
    </div>

    <!-- admin summary -->
    <div id="adminSummary" style="display:none">
      <div class="summary-card">
        <div class="summary-head">
          <span class="summary-head-title">📋 本月填報總覽</span>
          <button class="export-btn" onclick="exportCSV()">⬇ 匯出 CSV</button>
        </div>
        <div style="overflow-x:auto"><table class="summary-table" id="summaryTable"></table></div>
      </div>
    </div>

    <div class="month-nav">
      <button class="month-btn" onclick="changeMonth(-1)">‹</button>
      <div class="month-label" id="monthLabel"></div>
      <button class="month-btn" onclick="changeMonth(1)">›</button>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#dbeafe"></div>輪休代號</div>
      <div class="legend-item"><div class="legend-dot" style="background:#dcfce7"></div>休假</div>
      <div class="legend-item"><div class="legend-dot" style="background:#fef9c3"></div>事假</div>
      <div class="legend-item"><div class="legend-dot" style="background:#fee2e2"></div>病假</div>
      <div class="legend-item"><div class="legend-dot" style="background:#f3e8ff"></div>補假</div>
      <div class="legend-item"><div class="legend-dot" style="background:#fef3c7;border:1px solid #fcd34d"></div>封鎖日</div>
    </div>

    <div class="cal-card">
      <div class="cal-head">
        <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
      </div>
      <div class="cal-grid" id="calGrid">
        <div style="grid-column:1/-1;padding:32px;text-align:center;color:#94a3b8">載入中…</div>
      </div>
    </div>
    <div style="margin-top:10px;font-size:11px;color:#94a3b8;text-align:center">點選日期填寫輪休代號或假別</div>
  </div>
</div>

<!-- Fill popup -->
<div class="overlay" id="overlay">
  <div class="popup">
    <div class="popup-title" id="popupTitle"></div>
    <div class="sec-label">輪休代號（1–18）</div>
    <div class="shift-grid" id="shiftGrid"></div>
    <div class="sec-label">假別</div>
    <div class="leave-row">
      <button class="lv-btn" id="lv-off"   onclick="pickLeave('off')">休假</button>
      <button class="lv-btn" id="lv-event" onclick="pickLeave('event')">事假</button>
      <button class="lv-btn" id="lv-sick"  onclick="pickLeave('sick')">病假</button>
      <button class="lv-btn" id="lv-comp"  onclick="pickLeave('comp')">補假</button>
    </div>
    <div class="sec-label">備註</div>
    <textarea class="note-input" id="noteInput" rows="2" placeholder="選填"></textarea>
    <div class="popup-actions">
      <button class="btn-clear" onclick="clearDay()">清除</button>
      <button class="btn-cancel" onclick="closePopup()">取消</button>
      <button class="btn-save" id="saveBtn" onclick="saveDay()">儲存</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const LEAVE_LABEL = { off:'休假', event:'事假', sick:'病假', comp:'補假' };
const LEAVE_T     = { off:'t-off', event:'t-event', sick:'t-sick', comp:'t-comp' };
const LEAVE_CLS   = { off:'a-off', event:'a-event', sick:'a-sick', comp:'a-comp' };

let me = null;
let blockedDates = [];
let curYear  = new Date().getFullYear();
let curMonth = new Date().getMonth();
let localEntries = {};
let allData  = {};
let nameList = [];
let pickingDate = null;
let draft = { shift:null, leave:null, note:'' };

// build shift grid
(function() {
  let h = '';
  for (let n=1; n<=18; n++) h += `<button class="sg-btn" id="sg${n}" onclick="pickShift(${n})">${n}</button>`;
  document.getElementById('shiftGrid').innerHTML = h;
})();

async function api(body) {
  const r = await fetch(API_URL, { method:'POST', body: JSON.stringify(body) });
  return r.json();
}

// ── auth ──────────────────────────────────────────
function openAdminLogin() {
  document.getElementById('entryWrap').style.display = 'none';
  document.getElementById('adminLoginWrap').style.display = 'flex';
  setTimeout(() => document.getElementById('adminPwd').focus(), 50);
}
function backToEntry() {
  document.getElementById('adminLoginWrap').style.display = 'none';
  document.getElementById('entryWrap').style.display = 'flex';
}
document.getElementById('inputName').onkeydown = e => { if(e.key==='Enter') doEnter(); };
document.getElementById('adminPwd').onkeydown  = e => { if(e.key==='Enter') doAdminLogin(); };

async function doEnter() {
  const name = document.getElementById('inputName').value.trim();
  if (!name) { toast('請輸入姓名', true); return; }
  me = { name, role:'staff' };
  localStorage.setItem('rls_me', JSON.stringify(me));
  startApp();
}
function doAdminLogin() {
  if (document.getElementById('adminPwd').value.trim() !== ADMIN_KEY) { toast('密碼錯誤', true); return; }
  me = { name:'管理員', role:'admin' };
  localStorage.setItem('rls_me', JSON.stringify(me));
  startApp();
}
function doExit() {
  // keep localStorage so next visit auto-resumes
  me = null; localEntries = {}; allData = {}; nameList = []; blockedDates = [];
  document.getElementById('appWrap').style.display = 'none';
  document.getElementById('adminLoginWrap').style.display = 'none';
  document.getElementById('entryWrap').style.display = 'flex';
}
function doLogout() {
  // full logout - clears localStorage
  localStorage.removeItem('rls_me');
  me = null; localEntries = {}; allData = {}; nameList = []; blockedDates = [];
  document.getElementById('appWrap').style.display = 'none';
  document.getElementById('adminLoginWrap').style.display = 'none';
  document.getElementById('entryWrap').style.display = 'flex';
  document.getElementById('inputName').value = '';
  document.getElementById('adminPwd').value = '';
}

window.onload = function() {
  try {
    const saved = localStorage.getItem('rls_me');
    if (saved) { me = JSON.parse(saved); startApp(); return; }
  } catch(e) {}
  // not logged in - show entry screen (already visible by default)
};

async function startApp() {
  document.getElementById('entryWrap').style.display = 'none';
  document.getElementById('adminLoginWrap').style.display = 'none';
  document.getElementById('appWrap').style.display = 'block';
  document.getElementById('topName').textContent = me.role === 'admin' ? '管理員' : me.name;
  if (me.role === 'admin') {
    document.getElementById('adminCard').style.display = 'block';
    document.getElementById('adminSummary').style.display = 'block';
    document.getElementById('reloadBtn').style.display = 'inline-block';
  }
  // load blocked dates for everyone
  try {
    const res = await api({ action:'getBlocked' });
    if (res.ok) { blockedDates = res.blockedDates || []; }
    if (me.role === 'admin') renderBlockedList();
  } catch(e) {}
  loadAndRender();
}

async function reloadData() {
  const btn = document.getElementById('reloadBtn');
  btn.textContent = '載入中…'; btn.disabled = true;
  try {
    const res = await api({ action:'getAllEntries', yearMonth: monthKey() });
    if (res.ok) {
      allData = res.byName; nameList = res.nameList;
      renderSummary(); renderCal();
      toast(`已重新載入，共 ${nameList.length} 人`);
    } else { toast('載入失敗：' + (res.msg||''), true); }
  } catch(e) { toast('連線失敗', true); }
  finally { btn.textContent = '🔄 重新載入'; btn.disabled = false; }
}

// ── blocked dates ─────────────────────────────────
function isDateBlocked(y, m, d) {
  const check = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  return blockedDates.find(b => check >= b.start && check <= (b.end || b.start)) || null;
}

function renderBlockedList() {
  const list = document.getElementById('blockedList');
  if (!blockedDates.length) {
    list.innerHTML = '<div class="blocked-empty">尚無封鎖日期</div>';
    return;
  }
  list.innerHTML = blockedDates.map((b,i) => {
    const range = b.end && b.end !== b.start ? `${b.start} ～ ${b.end}` : b.start;
    const lbl   = b.label ? `（${b.label}）` : '';
    return `<div class="blocked-item">
      <div style="flex:1">
        <div class="blocked-item-dates">${range}</div>
        ${lbl ? `<div class="blocked-item-label">${lbl}</div>` : ''}
      </div>
      <button class="blocked-del" onclick="removeBlocked(${i})">✕</button>
    </div>`;
  }).join('');
}

async function addBlocked() {
  const start = document.getElementById('blockStart').value;
  const end   = document.getElementById('blockEnd').value || start;
  const label = document.getElementById('blockLabel').value.trim();
  if (!start) { toast('請選擇起始日期', true); return; }
  if (end < start) { toast('迄止日期不能早於起始日期', true); return; }
  blockedDates.push({ start, end, label });
  blockedDates.sort((a,b) => a.start.localeCompare(b.start));
  await saveBlocked();
  document.getElementById('blockStart').value = '';
  document.getElementById('blockEnd').value   = '';
  document.getElementById('blockLabel').value = '';
  renderBlockedList();
  renderCal();
  renderSummary();
  toast('封鎖日期已新增');
}

async function removeBlocked(i) {
  blockedDates.splice(i, 1);
  await saveBlocked();
  renderBlockedList();
  renderCal();
  renderSummary();
  toast('已移除');
}

async function saveBlocked() {
  try {
    await api({ action:'setBlocked', blockedDates });
  } catch(e) { toast('儲存失敗', true); }
}

// ── month & load ──────────────────────────────────
function changeMonth(d) {
  curMonth += d;
  if (curMonth > 11) { curMonth = 0; curYear++; }
  if (curMonth < 0)  { curMonth = 11; curYear--; }
  loadAndRender();
}
function monthKey() { return `${curYear}-${String(curMonth+1).padStart(2,'0')}`; }
const MN = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

async function loadAndRender() {
  document.getElementById('monthLabel').textContent = `${curYear} 年 ${MN[curMonth]}`;
  document.getElementById('calGrid').innerHTML =
    '<div style="grid-column:1/-1;padding:32px;text-align:center;color:#94a3b8">載入中…</div>';
  try {
    if (me.role === 'staff') {
      const res = await api({ action:'getEntries', name:me.name, yearMonth:monthKey() });
      if (res.ok) localEntries = res.entries || {};
    } else {
      const res = await api({ action:'getAllEntries', yearMonth:monthKey() });
      if (res.ok) {
        allData = res.byName || {};
        nameList = res.nameList || [];
      }
      renderSummary();
    }
  } catch(e) { toast('載入失敗', true); }
  renderCal();
}

// ── calendar ──────────────────────────────────────
function renderCal() {
  const firstDay    = new Date(curYear, curMonth, 1).getDay();
  const daysInMonth = new Date(curYear, curMonth+1, 0).getDate();
  const today = new Date();
  const isThisMonth = today.getFullYear()===curYear && today.getMonth()===curMonth;

  let html = '';
  for (let i=0; i<firstDay; i++) html += '<div class="cal-cell empty"></div>';
  for (let d=1; d<=daysInMonth; d++) {
    const dow = new Date(curYear, curMonth, d).getDay();
    const isToday   = isThisMonth && today.getDate()===d;
    const blockInfo = isDateBlocked(curYear, curMonth, d);
    const cls = ['cal-cell', dow===0?'sun':'', dow===6?'sat':'',
      isToday?'today':'', blockInfo?'day-blocked':''].filter(Boolean).join(' ');

    let inner = `<div class="day-num">${d}</div>`;
    if (blockInfo)
      inner += `<span class="block-label">🚫 ${blockInfo.label||'封鎖'}</span>`;

    if (me.role === 'staff') {
      const e = localEntries[d];
      if (e) {
        let tags = '';
        if (e.shift) tags += `<span class="cell-tag t-shift">代號 ${e.shift}</span>`;
        if (e.leave) tags += `<span class="cell-tag ${LEAVE_T[e.leave]}">${LEAVE_LABEL[e.leave]}</span>`;
        if (e.note)  tags += `<span class="cell-note">📝 ${e.note}</span>`;
        if (tags) inner += `<div class="cell-tags">${tags}</div>`;
      }
    } else {
      const rows = nameList.map(n => {
        const e = allData[n]?.[d]; if (!e) return '';
        const label = [e.shift?`代${e.shift}`:'', e.leave?LEAVE_LABEL[e.leave]:''].filter(Boolean).join('/');
        return label ? `<span class="who-row">${n}：${label}</span>` : '';
      }).filter(Boolean).join('');
      if (rows) inner += `<div class="who-list">${rows}</div>`;
    }

    const canClick = !blockInfo && me.role !== 'admin';
    html += `<div class="${cls}" ${canClick?`onclick="openPopup(${d})"`:''} >${inner}</div>`;
  }
  document.getElementById('calGrid').innerHTML = html;
}

// ── summary ───────────────────────────────────────
function renderSummary() {
  const days = Array.from({length:new Date(curYear,curMonth+1,0).getDate()},(_,i)=>i+1);
  let head = '<thead><tr><th>姓名</th>' + days.map(d => {
    const bl = isDateBlocked(curYear, curMonth, d);
    return `<th class="${bl?'blocked-th':''}">${d}${bl?'🚫':''}</th>`;
  }).join('') + '</tr></thead>';
  let body = '<tbody>';
  nameList.forEach(n => {
    body += `<tr><td>${n}</td>`;
    days.forEach(d => {
      const bl = isDateBlocked(curYear, curMonth, d);
      const e  = allData[n]?.[d];
      if (!e) { body += `<td ${bl?'class="blocked-td"':''}>─</td>`; return; }
      let c = '';
      if (e.shift) c += `<span class="mini-tag t-shift">${e.shift}</span>`;
      if (e.leave) c += `<span class="mini-tag ${LEAVE_T[e.leave]}">${LEAVE_LABEL[e.leave]}</span>`;
      body += `<td ${bl?'class="blocked-td"':''} title="${e.note||''}">${c}</td>`;
    });
    body += '</tr>';
  });
  document.getElementById('summaryTable').innerHTML = head + body + '</tbody>';
}

// ── popup ─────────────────────────────────────────
function openPopup(day) {
  if (isDateBlocked(curYear, curMonth, day)) return;
  pickingDate = day;
  const e = localEntries[day];
  draft = { shift:e?.shift??null, leave:e?.leave??null, note:e?.note??'' };
  const dow = new Date(curYear, curMonth, day).getDay();
  document.getElementById('popupTitle').textContent =
    `${curYear}/${curMonth+1}/${day}（${'日一二三四五六'[dow]}）`;
  refreshShiftGrid(); refreshLeaveButtons();
  document.getElementById('noteInput').value = draft.note;
  document.getElementById('saveBtn').disabled = false;
  document.getElementById('overlay').classList.add('show');
}
function refreshShiftGrid() {
  for (let n=1; n<=18; n++)
    document.getElementById(`sg${n}`).className = 'sg-btn'+(draft.shift===n?' active':'');
}
function refreshLeaveButtons() {
  ['off','event','sick','comp'].forEach(k =>
    document.getElementById(`lv-${k}`).className = 'lv-btn'+(draft.leave===k?' '+LEAVE_CLS[k]:''));
}
function pickShift(n) { draft.shift = draft.shift===n?null:n; refreshShiftGrid(); }
function pickLeave(k) { draft.leave = draft.leave===k?null:k; refreshLeaveButtons(); }
function closePopup() { document.getElementById('overlay').classList.remove('show'); }
document.getElementById('overlay').onclick = e => {
  if (e.target===document.getElementById('overlay')) closePopup();
};

async function saveDay() {
  if (!draft.shift && !draft.leave) { toast('請選擇代號或假別', true); return; }
  draft.note = document.getElementById('noteInput').value.trim();
  const btn = document.getElementById('saveBtn');
  btn.innerHTML = '<span class="spinner"></span>儲存中'; btn.disabled = true;
  try {
    const res = await api({ action:'saveEntry', entry:{
      name:me.name, yearMonth:monthKey(), day:pickingDate, ...draft }});
    if (!res.ok) { toast(res.msg||'儲存失敗', true); return; }
    localEntries[pickingDate] = {...draft};
    closePopup(); renderCal(); toast('已儲存');
  } catch(e) { toast('連線失敗', true); }
  finally { btn.innerHTML='儲存'; btn.disabled=false; }
}

async function clearDay() {
  document.getElementById('saveBtn').disabled = true;
  try {
    await api({ action:'saveEntry', entry:{
      name:me.name, yearMonth:monthKey(), day:pickingDate, shift:null, leave:null, note:'' }});
    delete localEntries[pickingDate];
    closePopup(); renderCal(); toast('已清除');
  } catch(e) { toast('連線失敗', true); }
  finally { document.getElementById('saveBtn').disabled=false; }
}

// ── export ────────────────────────────────────────
function exportCSV() {
  const days = Array.from({length:new Date(curYear,curMonth+1,0).getDate()},(_,i)=>i+1);
  let csv = '姓名,'+days.map(d=>`${d}日`).join(',')+'\n';
  nameList.forEach(n => {
    const sr = [n+'（代號）',...days.map(d=>allData[n]?.[d]?.shift??'')];
    const lr = [n+'（假別）',...days.map(d=>{
      const e=allData[n]?.[d]; if(!e) return '';
      return [e.leave?LEAVE_LABEL[e.leave]:'',e.note||''].filter(Boolean).join(' ');
    })];
    csv += sr.join(',')+'\n'+lr.join(',')+'\n';
  });
  const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `輪休填報_${monthKey()}.csv`;
  a.click(); toast('CSV 已匯出');
}

// ── toast ─────────────────────────────────────────
let toastTimer;
function toast(msg, err) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show'+(err?' err':'');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), 2500);
}
</script>
